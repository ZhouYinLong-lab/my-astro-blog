<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极客黑客的哈基米加密通讯终端</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen&display=swap" rel="stylesheet">
    <style>
        /* ==========================================
           1. 全局像素数码风与配色方案变量
           ========================================== */
        :root {
            --bg-color: #f0f0f0;         /* 浅灰背景 */
            --terminal-bg: #111111;      /* 终端黑背景 */
            --fieldset-bg: #ffffff;      /* 容器白背景 */
            --text-main: #000000;        /* 主文本黑 */
            --text-muted: #555555;       /* 辅助文本灰 */
            --console-text: #00ff41;     /* 终端绿 */
            
            /* 像素高饱和度点缀色 */
            --pixel-green-tag: #acd25c;  /* 绿色文件标签色 */
            --pixel-red-btn: #ee6c4d;    /* 红色删除/停止色 */
            --pixel-yellow-btn: #ffcc33; /* 黄色命令输入色 */
            --pixel-blue-btn: #3399cc;   /* 蓝色添加色 */
            --pixel-orange-btn: #f4a261; /* 橙色下载色 */
            
            /* 像素边框宽度 */
            --pixel-border-width: 4px;
        }

        /* 基础设定 */
        * {
            box-sizing: border-box;
            font-family: 'Press Start 2P', 'Silkscreen', 'Courier New', monospace;
            text-rendering: pixelated; 
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* 核心终端容器 */
        .container {
            background-color: var(--fieldset-bg);
            width: 100%;
            max-width: 800px;
            padding: 25px;
            border: var(--pixel-border-width) solid #000000;
            box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.1); 
        }

        /* 顶部标题 */
        h1 {
            color: #000;
            text-align: center;
            font-size: 1.2em;
            margin-top: 0;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* 像素 Fieldset 容器 */
        fieldset {
            border: calc(var(--pixel-border-width) / 2) solid #000;
            background-color: #fff;
            margin-bottom: 25px;
            padding: 20px;
            position: relative;
        }

        legend {
            background-color: #fff;
            padding: 0 10px;
            color: var(--text-muted);
            font-size: 0.8em;
            text-transform: uppercase;
        }

        /* 输入框和文本域统一风格 */
        input[type="text"],
        input[type="password"],
        textarea {
            width: 100%;
            background-color: #fff;
            color: #000;
            border: calc(var(--pixel-border-width) / 2) solid #000;
            padding: 12px;
            font-size: 0.8em;
            margin-bottom: 10px;
            text-transform: none;
            word-wrap: break-word;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* 绿色的字典输入标签 */
        #dictionaryTag {
            background-color: var(--pixel-green-tag);
            color: #fff;
            border: calc(var(--pixel-border-width) / 2) solid #000;
            padding: 4px 8px;
            font-size: 0.7em;
            margin-right: 10px;
            text-transform: uppercase;
        }

        /* 只读结果框风格 */
        textarea[readonly] {
            background-color: #f7f7f7;
            color: #888;
            border-color: #888;
        }

        /* 终端控制台 */
        #consoleLog {
            background-color: #f0f0f0;
            color: #007bff; 
            border: calc(var(--pixel-border-width) / 2) solid #000;
            padding: 15px;
            font-size: 0.7em;
            min-height: 150px;
            max-height: 250px;
            overflow-y: auto; /* 修改为 auto 更加优雅 */
            margin-top: 10px;
            text-transform: none;
        }

        #consoleLog span {
            display: block;
            margin-bottom: 4px;
        }

        /* ==========================================
           2. 像素按钮设计
           ========================================== */
        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            background: none;
            color: #fff;
            border: calc(var(--pixel-border-width) / 2) solid #000;
            padding: 12px 18px;
            font-size: 0.8em;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
        }

        button .icon {
            font-size: 1.2em;
        }

        button.encrypt-btn {
            background-color: var(--pixel-yellow-btn);
            color: #000; 
        }

        button.decrypt-btn {
            background-color: var(--pixel-orange-btn);
        }

        button.reset-btn {
            background-color: var(--pixel-red-btn);
        }

        button.copy-btn {
            background-color: var(--pixel-blue-btn);
        }

        /* ==========================================
           3. 布局与通用工具类 (取代内联样式)
           ========================================== */
        .flex-row-center {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .flex-grow-input {
            flex: 1;
            margin-bottom: 0 !important; /* 覆盖全局的 input bottom-margin */
        }

        hr.pixel-dashed {
            border: none;
            border-top: calc(var(--pixel-border-width) / 2) dashed #000;
            margin: 25px 0;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>🔒 极客黑客的哈基米加密通讯终端</h1>
        
        <fieldset>
            <legend>通讯协议 (Protocol)</legend>
            <div>
                <label>共享私钥 (Password):</label>
                <input type="password" id="secretKey" placeholder="输入双方约定的密钥...">
            </div>
            <div class="flex-row-center">
                <span id="dictionaryTag">字典(Dict)</span>
                <input type="text" id="alphabet" class="flex-grow-input" value="哈基米" placeholder="例如: 哈基米">
            </div>
        </fieldset>

        <hr class="pixel-dashed">

        <fieldset>
            <legend>加密隐写 (Encrypt)</legend>
            <textarea id="plainText" placeholder="输入你想说的话..."></textarea>
            <div class="btn-group">
                <button class="encrypt-btn" onclick="handleEncrypt()">
                    <span class="icon">👈</span> 生成密文
                </button>
                <button class="reset-btn" onclick="clearInput('plainText')">
                    <span class="icon">❌</span> 清空
                </button>
            </div>
        </fieldset>

        <fieldset>
            <legend>解密还原 (Decrypt)</legend>
            <textarea id="cipherText" placeholder="粘贴收到的乱码..."></textarea>
            <div class="btn-group">
                <button class="decrypt-btn" onclick="handleDecrypt()">
                    <span class="icon">⬇️</span> 还原明文
                </button>
                <button class="copy-btn" onclick="copyToClipboard('cipherText')">
                    <span class="icon">➕</span> 复制
                </button>
                <button class="reset-btn" onclick="clearInput('cipherText')">
                    <span class="icon">❌</span> 清空
                </button>
            </div>
        </fieldset>

        <hr class="pixel-dashed">
        
        <fieldset>
            <legend>终端输出 (Terminal Output)</legend>
            <textarea id="resultOutput" readonly placeholder="结果将显示在这里..."></textarea>
            
            <div id="consoleLog">
                <span>[INFO] 哈基米终端就绪。</span>
                <span>[WAIT] 等待协议输入...</span>
            </div>
        </fieldset>
    </div>

    <script>
        function bufferToBigInt(buffer) {
            const u8 = new Uint8Array(buffer.byteLength + 1);
            u8[0] = 1; 
            u8.set(new Uint8Array(buffer), 1);
            let hex = [...u8].map(b => b.toString(16).padStart(2, '0')).join('');
            return BigInt('0x' + hex);
        }

        function bigIntToBuffer(bigInt) {
            let hex = bigInt.toString(16);
            if (hex.length % 2 !== 0) hex = '0' + hex;
            let u8 = new Uint8Array(hex.length / 2 - 1);
            for (let i = 1; i < hex.length / 2; i++) {
                u8[i - 1] = parseInt(hex.slice(i * 2, i * 2 + 2), 16);
            }
            return u8;
        }

        function encodeBaseN(bigInt, alphabet) {
            if (bigInt === 0n) return alphabet[0];
            const base = BigInt(alphabet.length);
            let result = '';
            while (bigInt > 0n) {
                result = alphabet[Number(bigInt % base)] + result;
                bigInt = bigInt / base;
            }
            return result;
        }

        function decodeBaseN(str, alphabet) {
            const base = BigInt(alphabet.length);
            let bigInt = 0n;
            for (let i = 0; i < str.length; i++) {
                const index = alphabet.indexOf(str[i]);
                if (index === -1) throw new Error("包含非法字符！");
                bigInt = bigInt * base + BigInt(index);
            }
            return bigInt;
        }

        const enc = new TextEncoder();
        const dec = new TextDecoder();

        async function getKeyMaterial(password) {
            return window.crypto.subtle.importKey(
                "raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveBits", "deriveKey"]
            );
        }

        async function deriveKey(keyMaterial, salt) {
            return window.crypto.subtle.deriveKey(
                { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
                keyMaterial, { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]
            );
        }

        async function encryptMessage(message, password) {
            const salt = window.crypto.getRandomValues(new Uint8Array(16));
            const iv = window.crypto.getRandomValues(new Uint8Array(12));
            const keyMaterial = await getKeyMaterial(password);
            const key = await deriveKey(keyMaterial, salt);
            
            const cipherBuffer = await window.crypto.subtle.encrypt(
                { name: "AES-GCM", iv: iv }, key, enc.encode(message)
            );
            
            const combinedBuffer = new Uint8Array(16 + 12 + cipherBuffer.byteLength);
            combinedBuffer.set(salt, 0);
            combinedBuffer.set(iv, 16);
            combinedBuffer.set(new Uint8Array(cipherBuffer), 28);
            
            return combinedBuffer;
        }

        async function decryptMessage(combinedBuffer, password) {
            const salt = combinedBuffer.slice(0, 16);
            const iv = combinedBuffer.slice(16, 28);
            const data = combinedBuffer.slice(28);
            
            const keyMaterial = await getKeyMaterial(password);
            const key = await deriveKey(keyMaterial, salt);
            
            const decryptedBuffer = await window.crypto.subtle.decrypt(
                { name: "AES-GCM", iv: iv }, key, data
            );
            return dec.decode(decryptedBuffer);
        }

        const consoleLogEl = document.getElementById('consoleLog');

        function logToConsole(message, type = 'INFO') {
            const timestamp = new Date().toLocaleTimeString('zh-CN', { hour12: false });
            const logEntry = document.createElement('span');
            logEntry.textContent = `[${timestamp}] [${type}] ${message}`;
            consoleLogEl.appendChild(logEntry);
            consoleLogEl.scrollTop = consoleLogEl.scrollHeight; 
        }

        async function handleEncrypt() {
            try {
                const key = document.getElementById('secretKey').value;
                const alphabet = document.getElementById('alphabet').value;
                const plainText = document.getElementById('plainText').value;

                if (!key || !alphabet || !plainText) {
                    logToConsole("参数缺失，操作被阻止。", 'WAIT');
                    return alert("请填写完整参数！");
                }
                if (new Set(alphabet).size !== alphabet.length) {
                    logToConsole("协议字典非唯一值，加密失败。", 'ERR');
                    return alert("字典表不能有重复字符！");
                }

                logToConsole("开始加密...", 'WORK');
                const encryptedBuffer = await encryptMessage(plainText, key);
                const bigIntData = bufferToBigInt(encryptedBuffer);
                logToConsole("转换 Base-N 协议...", 'WORK');
                const baseNString = encodeBaseN(bigIntData, alphabet);
                
                document.getElementById('resultOutput').value = baseNString;
                logToConsole("加密完成。准备密文隐写。", 'DONE');
            } catch (e) {
                logToConsole(`加密失败: ${e.message}`, 'ERR');
                alert("加密失败: " + e.message);
            }
        }

        async function handleDecrypt() {
            try {
                const key = document.getElementById('secretKey').value;
                const alphabet = document.getElementById('alphabet').value;
                const cipherText = document.getElementById('cipherText').value.trim();

                if (!key || !alphabet || !cipherText) {
                    logToConsole("参数缺失，解密被阻止。", 'WAIT');
                    return alert("请填写完整参数！");
                }

                logToConsole("开始解密和还原...", 'WORK');
                logToConsole("反向 Base-N 解析...", 'WORK');
                const bigIntData = decodeBaseN(cipherText, alphabet);
                const encryptedBuffer = bigIntToBuffer(bigIntData);
                logToConsole("调用 AES 核心解密...", 'WORK');
                const plainText = await decryptMessage(encryptedBuffer, key);
                
                document.getElementById('resultOutput').value = plainText;
                logToConsole("解密完成。信息已还原。", 'DONE');
            } catch (e) {
                logToConsole("解密失败！未知协议或密文错误。", 'ERR');
                alert("解密失败！请检查私钥、字典表是否匹配，或密文是否完整。");
                console.error(e);
            }
        }

        function clearInput(id) {
            document.getElementById(id).value = '';
            logToConsole(`清空输入区域 [${id}]。`);
        }

        function copyToClipboard(id) {
            const el = document.getElementById(id);
            el.select();
            document.execCommand('copy');
            logToConsole(`复制文本区域 [${id}] 内容到剪贴板。`);
        }
    </script>
</body>
</html>
