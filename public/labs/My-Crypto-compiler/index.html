<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自定义进制加密通讯器</title>
</head>
<body>
    <div class="container">
        <h2>🔒 自定义进制加密通讯</h2>
        
        <div>
            <label>共享私钥 (Password):</label>
            <input type="password" id="secretKey" placeholder="输入双方约定的密钥">
        </div>

        <div>
            <label>自定义字典表 (2-16个字):</label>
            <input type="text" id="alphabet" value="哈基米" placeholder="例如: 哈基米">
        </div>

        <hr>

        <div>
            <h3>加密 (发送方)</h3>
            <textarea id="plainText" placeholder="输入你想说的话..."></textarea>
            <button onclick="handleEncrypt()">生成密文</button>
        </div>

        <div>
            <h3>解密 (接收方)</h3>
            <textarea id="cipherText" placeholder="粘贴收到的乱码..."></textarea>
            <button onclick="handleDecrypt()">还原明文</button>
        </div>

        <hr>
        
        <div>
            <h3>输出结果</h3>
            <textarea id="resultOutput" readonly placeholder="结果将显示在这里..."></textarea>
        </div>
    </div>

    <script src="app.js"></script>
</body>
<style>
    /* 定义高饱和度的主题变量 */
:root {
    --bg-color: #0d0d0d;         /* 深邃黑背景 */
    --container-bg: #1a1a1a;     /* 面板碳灰背景 */
    --text-main: #f0f0f0;        /* 主文本亮白 */
    --text-muted: #888888;       /* 辅助文本灰 */
    
    /* 高饱和度点缀色（无蓝紫） */
    --neon-orange: #ff4500;      /* 荧光橙红 - 警戒/醒目 */
    --neon-yellow: #ffd700;      /* 赛博明黄 - 强调 */
    --neon-green: #39ff14;       /* 毒液绿 - 成功/操作 */
}

/* 全局基础设定 */
body {
    background-color: var(--bg-color);
    color: var(--text-main);
    font-family: 'Consolas', 'Courier New', monospace; /* 采用等宽字体增强代码感 */
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    box-sizing: border-box;
}

/* 核心容器面板 */
.container {
    background-color: var(--container-bg);
    width: 100%;
    max-width: 600px;
    padding: 35px;
    border-radius: 12px;
    /* 添加橙色霓虹发光边框效果 */
    box-shadow: 0 0 15px rgba(255, 69, 0, 0.2), 
                inset 0 0 0 1px rgba(255, 69, 0, 0.5);
}

/* 标题样式 */
h2 {
    color: var(--neon-orange);
    text-align: center;
    margin-top: 0;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 0 0 8px rgba(255, 69, 0, 0.6);
}

h3 {
    color: var(--neon-yellow);
    font-size: 1.1em;
    margin-bottom: 10px;
    border-left: 4px solid var(--neon-yellow);
    padding-left: 10px;
}

/* 分割线 */
hr {
    border: none;
    border-top: 1px dashed #333;
    margin: 25px 0;
}

/* 表单布局 */
.container > div {
    margin-bottom: 20px;
}

label {
    display: block;
    margin-bottom: 8px;
    color: var(--text-muted);
    font-size: 0.9em;
}

/* 输入框和文本域统一风格 */
input[type="text"],
input[type="password"],
textarea {
    width: 100%;
    background-color: #000000;
    color: var(--neon-green); /* 输入的文字显示为高亮绿 */
    border: 1px solid #333;
    border-radius: 6px;
    padding: 12px;
    font-family: inherit;
    font-size: 1em;
    box-sizing: border-box;
    transition: all 0.3s ease;
}

textarea {
    resize: vertical;
    min-height: 80px;
}

/* 只读输出框稍微区分 */
textarea[readonly] {
    background-color: #111;
    color: var(--neon-orange);
    border-color: var(--neon-orange);
    box-shadow: inset 0 0 10px rgba(255, 69, 0, 0.1);
}

/* 聚焦时的发光效果 */
input:focus,
textarea:focus {
    outline: none;
    border-color: var(--neon-green);
    box-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
}

/* 按钮样式设计 */
button {
    width: 100%;
    background: linear-gradient(45deg, #cc3700, var(--neon-orange));
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 12px;
    font-size: 1.1em;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s ease;
    margin-top: 10px;
}

/* 按钮悬停和点击特效 */
button:hover {
    background: linear-gradient(45deg, var(--neon-orange), #ff6a00);
    box-shadow: 0 0 15px rgba(255, 69, 0, 0.6);
    transform: translateY(-1px);
}

button:active {
    transform: translateY(2px);
    box-shadow: 0 0 5px rgba(255, 69, 0, 0.6);
}

/* 针对解密按钮使用另一种高饱和色区分 */
button[onclick="handleDecrypt()"] {
    background: linear-gradient(45deg, #228b22, var(--neon-green));
    color: #000; /* 深色文字增加对比 */
}

button[onclick="handleDecrypt()"]:hover {
    background: linear-gradient(45deg, var(--neon-green), #66ff4d);
    box-shadow: 0 0 15px rgba(57, 255, 20, 0.6);
}
</style>
</html>
