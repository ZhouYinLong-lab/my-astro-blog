# 网站的基本信息
site:
  tab: 寒柳别苑 # 浏览器标签栏上显示的文本
  title: 寒柳别苑 # 网站的标题
  description: 柳含知发挥想象力和创造力的赛博后花园 # 网站的描述,用于SEO等
  language: zh # 🌟 关键：告诉浏览器这是一个简体中文网站
  favicon: /favicon.ico # 网站的图标,用于浏览器标签栏和其他地方显示
  theme: # 更多主题 https://daisyui.com/docs/themes/
    light: lemonade # 主题的浅色模式
    dark: forest # 主题的深色模式
    code: github-dark # 代码块的主题 https://expressive-code.com/guides/themes/
  date_format: YYYY年MM月DD日 # 🌟 日期格式也改成了中文习惯
  blog: # 博客相关配置
    pageSize: 8 # 每页显示的文章数量
  menu: # 菜单配置
    - id: home 
      text: 首页 # 汉化
      href: / 
      svg: "material-symbols:home-outline-rounded"
      target: _self
    - id: blog
      text: 博客 # 汉化
      href: /blog
      svg: "material-symbols:book-2-outline-rounded"
      target: _self
    - id: project
      text: 实验室 # 汉化
      href: /project
      svg: "material-symbols:code-blocks-outline"
      target: _self
    - id: chores
      text: 别苑杂务 # 🌟 升级为大分支
      href: "#" # 父级菜单通常不需要直接跳转
      svg: "material-symbols:dashboard-customize-outline-rounded"
      target: _self
      subItems: # 🌟 下设三个小分支
        - id: about
          text: 居士自序
          href: /about
          svg: "material-symbols:info-outline-rounded"
          target: _self
        - id: heatmap
          text: 博客热力图
          href: /chores/heatmap
          svg: "material-symbols:local-fire-department-outline-rounded"
          target: _self
        - id: changelog
          text: 更新日志
          href: /chores/changelog
          svg: "material-symbols:update-rounded"
          target: _self
    - id: friend
      text: 友链 # 汉化
      href: /friend
      svg: "material-symbols:supervisor-account-outline-rounded"
      target: _self
    - id: backyard
      text: 后院 # 汉化
      href: "/backyard"
      target: _self # 在新标签页打开
      svg: "material-symbols:attach-email-outline-rounded"

