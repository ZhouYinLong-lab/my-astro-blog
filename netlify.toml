# Netlify deployment configuration
[build]
  command = "pnpm build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' cdn.staticfile.net cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' fonts.googleapis.com cdn.staticfile.net; img-src 'self' data: https:; font-src 'self' fonts.gstatic.com cdn.staticfile.net; connect-src 'self' https:; frame-src 'self' https:; media-src 'self' https:"

[[redirects]]
  from = "/labs/*"
  to = "/labs/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
